                                    <div className="bg-blue-600 p-10 rounded-[2.5rem] text-white shadow-2xl shadow-blue-600/30">
                                        <h4 className="text-2xl font-black mb-4 italic uppercase tracking-tighter">Tiketify Protection</h4>
                                        <p className="text-blue-100 mb-8 font-medium">Your purchase is secured by our elite Buyer Shield protection program.</p>
                                        <ul className="space-y-4">
                                            <li className="flex items-center font-bold text-sm"><i data-lucide="check-circle-2" className="mr-3 w-5 h-5"></i> Authentic Ticket Guarantee</li>
                                            <li className="flex items-center font-bold text-sm"><i data-lucide="check-circle-2" className="mr-3 w-5 h-5"></i> On-Time Digital Delivery</li>
                                            <li className="flex items-center font-bold text-sm"><i data-lucide="check-circle-2" className="mr-3 w-5 h-5"></i> 150% Refund on Fail</li>
                                        </ul>
                                    </div>
                                </div>

                                <div className="lg:col-span-8">
                                    <div className="bg-white p-10 rounded-[2.5rem] shadow-2xl shadow-blue-900/5 border border-slate-100">
                                        <div className="flex justify-between items-center mb-10">
                                            <h3 className="text-3xl font-black italic uppercase tracking-tighter">Available Inventory</h3>
                                            <span className="text-[10px] font-black bg-slate-100 px-3 py-1 rounded text-slate-500 tracking-widest">CURRENCY: EUR €</span>
                                        </div>
                                        <div className="space-y-6">
                                            {tickets.map((t, idx) => (
                                                <div key={idx} className="group p-8 border border-slate-100 rounded-[2rem] hover:border-blue-500 hover:bg-blue-50/20 transition-all flex flex-col md:flex-row items-center gap-8">
                                                    <div className={`w-3 h-20 rounded-full shrink-0 ${t.color}`}></div>
                                                    <div className="flex-1 text-center md:text-left">
                                                        <div className="flex flex-col md:flex-row items-center gap-3 mb-2">
                                                            <h4 className="text-2xl font-black italic uppercase tracking-tighter">{t.cat}</h4>
                                                            <span className="px-3 py-1 bg-red-100 text-red-600 text-[10px] font-black uppercase rounded">{t.stock}</span>
                                                        </div>
                                                        <p className="text-slate-500 text-sm leading-relaxed max-w-md">{t.desc}</p>
                                                    </div>
                                                    <div className="text-center md:text-right min-w-[140px]">
                                                        <p className="text-3xl font-black italic tracking-tighter">€{t.price.toLocaleString()}</p>
                                                        <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Fixed Price</p>
                                                    </div>
                                                    <a 
                                                        href={`mailto:gonapyoung@gmail.com?subject=TIKETIFY ORDER: ${t.cat} - UCL Final 2026&body=Hello Tiketify Team,%0D%0A%0D%0AI would like to secure the following ticket:%0D%0A%0D%0ACategory: ${t.cat}%0D%0APrice: €${t.price}%0D%0AEvent: UEFA Champions League Final 2026 - Budapest%0D%0A%0D%0APlease provide payment instructions.`}
                                                        className="w-full md:w-auto px-10 py-4 bg-slate-950 text-white font-black rounded-2xl hover:bg-blue-600 transition-all shadow-xl text-sm uppercase tracking-widest text-center"
                                                    >
                                                        Buy Now!!
                                                    </a>
                                                </div>
                                            ))}
                                        </div>
                                        <p className="mt-12 text-center text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em]">
                                            Prices fluctuate based on market demand. All sales verified by Tiketify HQ.
                                        </p>
                                    </div>
                                </div>
                            </div>
                        </section>

                        {/* 15 Moving Reviews Marquee */}
                        <section className="py-20 bg-white overflow-hidden border-y border-slate-100">
                            <div className="text-center mb-12">
                                <h2 className="text-3xl font-black uppercase tracking-tighter italic">Recent <span className="text-blue-600">Client Reviews</span></h2>
                            </div>
                            <div className="marquee-container relative flex overflow-x-hidden">
                                <div className="animate-marquee flex whitespace-nowrap">
                                    {[...reviews, ...reviews].map((rev, i) => (
                                        <div key={i} className="flex-none w-[400px] mx-6 p-8 bg-slate-50 border border-slate-100 rounded-[2rem] shadow-sm">
                                            <div className="flex items-center mb-4">
                                                <div className="w-14 h-14 rounded-full overflow-hidden mr-4 border-2 border-blue-500 shrink-0">
                                                    <img src={rev.img} className="w-full h-full object-cover" alt={rev.name} />
                                                </div>
                                                <div className="overflow-hidden">
                                                    <p className="text-sm font-black uppercase tracking-tight text-slate-900 truncate">{rev.name}</p>
                                                    <div className="flex text-yellow-400">
                                                        {[...Array(5)].map((_, j) => <i key={j} data-lucide="star" className="w-3 h-3 fill-current"></i>)}
                                                    </div>
                                                </div>
                                            </div>
                                            <p className="text-slate-600 text-sm italic leading-relaxed whitespace-normal">"{rev.text}"</p>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </section>

                        {/* UCL Specific FAQ Section */}
                        <section className="py-32 bg-slate-50">
                            <div className="max-w-4xl mx-auto px-4">
                                <h2 className="text-4xl font-black text-center mb-20 uppercase tracking-tighter italic">Frequently <span className="text-blue-600">Asked Questions</span></h2>
                                <div className="space-y-6">
                                    {[
                                        { q: "Are tickets guaranteed for the 2026 Final?", a: "Yes. TIKETIFY operates through a vetted network of season ticket holders and corporate partners. Every purchase includes our \"Secure-Transfer\" guarantee ensuring your entry to the Puskás Aréna." },
                                        { q: "How and when will I receive my tickets?", a: "UEFA typically releases mobile tickets via the official \"UEFA Mobile Tickets\" app 7-10 days before the event. We will guide you through the secure transfer process to your mobile device." },
                                        { q: "What happens if the teams I support don't make it?", a: "The demand for UCL Final tickets is based on the event's prestige. However, TIKETIFY offers an optional \"Swap Protection\" allowing you to trade your tickets for another event if your team is eliminated before the semi-finals." },
                                        { q: "Is TIKETIFY affiliated with UEFA?", a: "No, TIKETIFY is a secondary market resale brand. We specialize in providing access to sold-out events and premium experiences that are no longer available through primary box offices." }
                                    ].map((faq, i) => (
                                        <div key={i} className="p-10 rounded-[2.5rem] bg-white border border-slate-100 shadow-xl shadow-blue-900/5">
                                            <h4 className="text-xl font-bold mb-4 flex items-start">
                                                <span className="w-10 h-10 rounded-full bg-blue-600 text-white text-xs flex items-center justify-center mr-5 shrink-0 italic font-black shadow-lg shadow-blue-600/20">?</span>
                                                <span className="pt-1">{faq.q}</span>
                                            </h4>
                                            <p className="text-slate-600 ml-15 pl-12 leading-relaxed text-lg">{faq.a}</p>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </section>
                    </div>
                );
            };

            return (
                <div className="min-h-screen flex flex-col selection:bg-blue-100 selection:text-blue-900">
                    <Navbar />
                    <main className="flex-grow pt-20">
                        {activePage === 'home' ? <HomePage /> : <ChampionsLeaguePage />}
                    </main>
                    <Footer />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
